<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Школьный Дневник — Правовые документы</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0e0c;
      color: #e8e0d0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f5ede0;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #a09080;
      margin-bottom: 3rem;
      font-size: 0.95rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    a.card {
      display: block;
      background: #1a1815;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      text-decoration: none;
      color: #e8e0d0;
      transition: all 0.2s ease;
    }
    a.card:hover {
      background: #252018;
      border-color: rgba(255, 190, 100, 0.25);
      transform: translateY(-2px);
    }
    a.card .title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f5ede0;
      margin-bottom: 0.25rem;
    }
    a.card .desc {
      font-size: 0.85rem;
      color: #806858;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #504540;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">📚</div>
    <h1>Школьный Дневник</h1>
    <p class="subtitle">Правовые документы приложения</p>
    
    <div class="links">
      <a href="privacy-policy" class="card">
        <div class="title">🔒 Политика конфиденциальности</div>
        <div class="desc">Как мы собираем, используем и защищаем ваши данные</div>
      </a>
      <a href="terms-of-service" class="card">
        <div class="title">📋 Условия использования</div>
        <div class="desc">Правила использования приложения и ограничения ответственности</div>
      </a>
    </div>
    
    <p class="footer">
      Школьный Дневник &copy; 2026 &mdash; учебный проект
    </p>
  </div>
</body>
</html>
