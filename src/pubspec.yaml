name: dnevnik_app
description: "Школьный Дневник 10А — приложение для расписания и домашних заданий"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6
  image_picker: ^1.2.1
  flutter_localizations:
    sdk: flutter
  share_plus: ^12.0.1
  gal: ^2.3.0
  http: ^1.2.0
  crypto: ^3.0.6
  liquid_swipe: ^3.1.0
  path_provider: ^2.1.5
  flutter_displaymode: ^0.6.0
  flutter_dotenv: ^6.0.1
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  lucide_icons: ^0.257.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.2.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/Remove_all_borders_and_frames_202606231258.jpeg"
  min_sdk_android: 21
