publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6
  image_picker: ^1.2.1
  flutter_localizations:
    sdk: flutter
  share_plus: ^12.0.1
  gal: ^2.3.0
  http: ^1.2.0
